spring.application.name=wildsight-backend
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
springdoc.api-docs.path=/api-docs

springdoc.swagger-ui.path=/swagger-ui.html

springdoc.swagger-ui.operationsSorter=method

springdoc.swagger-ui.tagsSorter=alpha

springdoc.swagger-ui.display-request-duration=true

springdoc.swagger-ui.tryItOutEnabled=true
# ==========================
# MySQL Database
# ==========================
spring.datasource.url=jdbc:mysql://localhost:3306/wildsight_db?useSSL=false&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================
# JPA / Hibernate
# ==========================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==========================
# JWT
# ==========================
jwt.secret=ThisIsMyVerySecureSecretKeyForWildSightProject123456789
jwt.expiration=86400000

# ==========================
# Server
# ==========================
server.port=8080