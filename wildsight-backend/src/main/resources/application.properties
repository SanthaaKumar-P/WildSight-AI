spring.application.name=wildsight-backend

# ==========================
# MySQL Database
# ==========================
spring.datasource.url=jdbc:mysql://localhost:3306/wildsight_db?useSSL=false&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================
# JPA / Hibernate
# ==========================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==========================
# JWT
# ==========================
jwt.secret=ThisIsMyVerySecureSecretKeyForWildSightProject123456789
jwt.expiration=86400000

# ==========================
# Server
# ==========================
server.port=8080